name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle permissions
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew jarMod --no-daemon

      - name: Verify JAR exists
        run: |
          ls -la build/libs/
          test -f build/libs/ai-agent-mod.jar && echo "JAR built successfully" || exit 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/ai-agent-mod.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
